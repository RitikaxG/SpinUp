name: test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Diagnose lockfile drift
        run: |
          bun --version
          rm -rf node_modules apps/*/node_modules packages/*/node_modules
          bun install
          echo "----- git status -----"
          git status --short
          echo "----- bun.lock diff -----"
          git diff -- bun.lock || true
          echo "----- package manifest diff -----"
          git diff -- package.json apps/*/package.json packages/*/package.json || true

      - name: Fail intentionally after diagnostics
        run: exit 1